name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        env:
          DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/placeholder"
          NEXTAUTH_SECRET: "build-time-placeholder-secret-key-minimum-32-chars"
          NEXTAUTH_URL: "https://www.snalattal.me"
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Package standalone build
        run: |
          mkdir -p deploy-package
          # Use /. to copy ALL files including hidden (.next directory)
          cp -r .next/standalone/. deploy-package/
          # Copy static assets into .next/static
          cp -r .next/static deploy-package/.next/static
          # Copy additional files needed on server
          cp -r public deploy-package/public
          cp -r prisma deploy-package/prisma
          cp ecosystem.config.js deploy-package/

          echo "=== Verifying package ==="
          ls -la deploy-package/.next/static/ | head -5

          tar -czf deploy.tar.gz -C deploy-package .

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/deploy/apps/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /home/deploy/apps/sna-alattal

            echo "🔄 Stopping app..."
            pm2 stop sna-alattal 2>/dev/null || true
            pm2 delete sna-alattal 2>/dev/null || true
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 2

            echo "📦 Extracting new build..."
            tar -xzf /home/deploy/apps/deploy.tar.gz -C /home/deploy/apps/sna-alattal/ --overwrite
            rm -f /home/deploy/apps/deploy.tar.gz

            echo "🗄️ Syncing database schema..."
            npx prisma db push --skip-generate 2>/dev/null || true

            echo "📁 Ensuring logs directory..."
            mkdir -p logs

            echo "🔍 Checking .env file..."
            if [ -f .env ]; then
              echo ".env file exists"
            else
              echo "⚠️ WARNING: .env file is MISSING!"
            fi

            echo "🔍 Checking server.js..."
            ls -la server.js || echo "⚠️ WARNING: server.js not found!"

            echo "🔍 Checking .next directory..."
            ls -la .next/ || echo "⚠️ WARNING: .next directory not found!"
            ls -la .next/static/ || echo "⚠️ WARNING: .next/static directory not found!"

            echo "🚀 Starting app with PM2..."
            pm2 start ecosystem.config.js

            echo "💾 Saving PM2 process list..."
            pm2 save

            echo "⏳ Waiting for app to start..."
            sleep 15

            echo "🏥 Health check..."
            for i in 1 2 3 4 5 6; do
              if curl -sf --max-time 10 http://localhost:3000/api/health; then
                echo " ✅ App is healthy!"
                break
              fi
              echo " Attempt $i failed, waiting 10s..."
              sleep 10
            done

            echo "📊 PM2 status:"
            pm2 status

            echo "📋 Recent error logs:"
            pm2 logs sna-alattal --err --lines 20 --nostream 2>/dev/null || true

            echo "✅ Deployment completed!"
