name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        env:
          DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/placeholder"
          NEXTAUTH_SECRET: "build-time-placeholder-secret-key-minimum-32-chars"
          NEXTAUTH_URL: "https://www.snalattal.me"
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Package standalone build
        run: |
          mkdir -p deploy-package
          cp -r .next/standalone/. deploy-package/
          cp -r .next/static deploy-package/.next/static
          cp -r public deploy-package/public
          cp -r prisma deploy-package/prisma
          cp ecosystem.config.js deploy-package/
          tar -czf deploy.tar.gz -C deploy-package .
          echo "Package size: $(du -h deploy.tar.gz | cut -f1)"

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/deploy/apps/"
          timeout: 120s

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            APP_DIR="/home/deploy/apps/sna-alattal"
            BACKUP_DIR="/home/deploy/apps/sna-alattal-backup"
            DEPLOY_TAR="/home/deploy/apps/deploy.tar.gz"

            cd "$APP_DIR"

            # --- Step 1: Extract new build to temp dir FIRST (before stopping app) ---
            echo "📦 Extracting new build to temp directory..."
            TEMP_DIR="/home/deploy/apps/sna-alattal-new"
            rm -rf "$TEMP_DIR"
            mkdir -p "$TEMP_DIR"
            tar -xzf "$DEPLOY_TAR" -C "$TEMP_DIR"
            rm -f "$DEPLOY_TAR"

            # Verify critical files exist in new build
            if [ ! -f "$TEMP_DIR/server.js" ] || [ ! -d "$TEMP_DIR/.next" ]; then
              echo "❌ CRITICAL: New build is incomplete! Aborting deploy."
              rm -rf "$TEMP_DIR"
              exit 1
            fi
            echo "✅ New build verified"

            # --- Step 2: Backup current .env (it's not in the build) ---
            cp "$APP_DIR/.env" "$TEMP_DIR/.env" 2>/dev/null || true

            # --- Step 3: Cleanup to reduce CPU usage ---
            echo "🧹 Cleaning up to reduce CPU..."
            pm2 kill 2>/dev/null || true
            sleep 2
            fuser -k 3000/tcp 2>/dev/null || true
            # Clean old logs and cache
            rm -rf "$APP_DIR/logs/"*.log 2>/dev/null || true
            rm -rf "$APP_DIR/.next/cache" 2>/dev/null || true
            rm -rf /tmp/prisma* 2>/dev/null || true
            sleep 1

            # --- Step 4: Swap directories (atomic-ish) ---
            echo "🔄 Swapping builds..."
            rm -rf "$BACKUP_DIR"
            # Keep current as backup
            mv "$APP_DIR" "$BACKUP_DIR" 2>/dev/null || true
            mv "$TEMP_DIR" "$APP_DIR"

            cd "$APP_DIR"

            # --- Step 5: Sync database ---
            echo "🗄️ Syncing database schema..."
            npx prisma db push --skip-generate 2>/dev/null || true

            # --- Step 6: Start app ---
            mkdir -p logs
            echo "🚀 Starting app..."
            pm2 start ecosystem.config.js --update-env
            pm2 save

            # --- Step 7: Health check with generous timeout ---
            echo "⏳ Waiting for app to initialize..."
            sleep 20

            HEALTHY=false
            for i in 1 2 3 4 5 6 7 8; do
              if curl -sf --max-time 10 http://localhost:3000 > /dev/null 2>&1; then
                echo "✅ App is healthy! (attempt $i)"
                HEALTHY=true
                break
              fi
              echo "  Attempt $i/8 - waiting 10s..."
              sleep 10
            done

            if [ "$HEALTHY" = false ]; then
              echo "⚠️ Health check failed - checking PM2 logs..."
              pm2 logs sna-alattal --err --lines 15 --nostream 2>/dev/null || true

              # Rollback if backup exists
              if [ -d "$BACKUP_DIR" ]; then
                echo "🔄 Rolling back to previous version..."
                pm2 delete sna-alattal 2>/dev/null || true
                fuser -k 3000/tcp 2>/dev/null || true
                sleep 2
                rm -rf "$APP_DIR"
                mv "$BACKUP_DIR" "$APP_DIR"
                cd "$APP_DIR"
                pm2 start ecosystem.config.js --update-env
                pm2 save
                echo "✅ Rollback complete"
                exit 1
              fi
            fi

            # Cleanup backup on success
            rm -rf "$BACKUP_DIR"

            echo "📊 PM2 status:"
            pm2 status
            echo "✅ Deployment completed!"
