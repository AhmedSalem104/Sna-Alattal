name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/deploy/apps/sna-alattal

            echo "📥 Pulling latest changes..."
            git pull origin master

            echo "📦 Installing dependencies..."
            npm install --ignore-scripts --prefer-offline --no-audit --no-fund || npm install --ignore-scripts --no-audit --no-fund

            echo "🔧 Generating Prisma client..."
            npx prisma generate

            echo "🗄️ Syncing database schema..."
            npx prisma db push --skip-generate

            echo "🔨 Building application..."
            NEXT_TELEMETRY_DISABLED=1 NODE_OPTIONS="--max-old-space-size=1536" npm run build

            echo "📁 Ensuring logs directory exists..."
            mkdir -p logs

            echo "🔄 Stopping ALL PM2 processes and releasing port..."
            pm2 stop all 2>/dev/null || true
            pm2 delete all 2>/dev/null || true

            echo "🔪 Force killing any process on port 3000..."
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 3

            echo "🚀 Starting app with PM2..."
            pm2 start ecosystem.config.js

            echo "💾 Saving PM2 process list..."
            pm2 save

            echo "⏳ Waiting for app to start (15s)..."
            sleep 15

            echo "🏥 Health check..."
            for i in 1 2 3; do
              if curl -sf http://localhost:3000/api/health; then
                echo " ✅ App is healthy!"
                break
              fi
              echo " Attempt $i failed, waiting 10s..."
              sleep 10
            done

            echo "📊 PM2 status:"
            pm2 status

            echo "✅ Deployment completed!"
